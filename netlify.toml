# Netlify build for the Console SPA (Vite). Production branch: rebuild (until it
# merges to main). Env (VITE_SUPABASE_URL / _ANON_KEY / _VAPID_PUBLIC_KEY) is set
# in the Netlify site config, not committed here.
[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

# SPA fallback — every route serves the app shell (client-side routing).
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
