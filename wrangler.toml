# Cloudflare Workers static-assets deploy (Netlify-exit spec §4b,
# control-tower docs/migrations/netlify-exit.md). Pure assets Worker — no
# Worker code; SPA fallback replaces the netlify.toml /* → /index.html rewrite.
name = "release-notifier"
