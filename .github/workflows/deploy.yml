name: Build & deploy to Cloudflare

# Deploy-on-push for the production branch (Netlify-exit spec §4b, amended
# 2026-07-18: production stays `rebuild` — `main` carries the undeployed v2
# rewrite; consolidation is a separate product decision). Cloudflare has no
# per-deploy billing, so push-triggered deploys are free — unlike the old
# Netlify manual-dispatch flow this replaces.
#
# Skips gracefully while the CLOUDFLARE_* secrets are unprovisioned
# (control-tower#65 §2.1), so the workflow can land before the owner creates
# the deploy token.

on:
  push:
    branches: [rebuild]
  workflow_dispatch:

concurrency:
  group: deploy-web-release-notifier
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      HAS_CLOUDFLARE_SECRETS: ${{ secrets.CLOUDFLARE_API_TOKEN != '' && secrets.CLOUDFLARE_ACCOUNT_ID != '' }}
    steps:
      - name: Skip until Cloudflare secrets are provisioned
        if: env.HAS_CLOUDFLARE_SECRETS != 'true'
        run: 'echo "CLOUDFLARE_API_TOKEN / CLOUDFLARE_ACCOUNT_ID not set — building only, skipping the deploy (see control-tower#65)."'

      - uses: actions/checkout@v4
        with:
          # Production is the rebuild branch (see AGENTS.md): pin the build to
          # it so a manual dispatch selected from another branch cannot deploy
          # that branch by accident. The v2 launch (#75) retargets this to main
          # together with the push trigger above.
          ref: rebuild

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - name: Build (Vite)
        env:
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ vars.VITE_SUPABASE_ANON_KEY }}
          VITE_VAPID_PUBLIC_KEY: ${{ vars.VITE_VAPID_PUBLIC_KEY }}
        run: npm run build

      - name: Deploy to Cloudflare Workers
        if: env.HAS_CLOUDFLARE_SECRETS == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
