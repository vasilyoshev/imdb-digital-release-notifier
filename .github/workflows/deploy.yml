name: Build & deploy to Cloudflare

# Deploy-on-push for production. The Netlify-exit cutover (repo #75) retargeted
# this from the old `rebuild` branch to `main` and swapped the Netlify deploy for
# a Cloudflare Workers deploy. Cloudflare has no per-deploy billing, so a
# push-triggered deploy is free (unlike the old Netlify manual-dispatch flow).
#
# Builds the Vite SPA, then `wrangler deploy` publishes it as a Workers Static
# Assets site plus the Stremio-addon Worker (see wrangler.toml). Skips the deploy
# step gracefully if the CLOUDFLARE_* secrets are ever unset.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-web-release-notifier
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      HAS_CLOUDFLARE_SECRETS: ${{ secrets.CLOUDFLARE_API_TOKEN != '' && secrets.CLOUDFLARE_ACCOUNT_ID != '' }}
    steps:
      - name: Skip until Cloudflare secrets are provisioned
        if: env.HAS_CLOUDFLARE_SECRETS != 'true'
        run: 'echo "CLOUDFLARE_API_TOKEN / CLOUDFLARE_ACCOUNT_ID not set — building only, skipping the deploy."'

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - name: Build (Vite)
        env:
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ vars.VITE_SUPABASE_ANON_KEY }}
          VITE_VAPID_PUBLIC_KEY: ${{ vars.VITE_VAPID_PUBLIC_KEY }}
        run: npm run build

      - name: Deploy to Cloudflare Workers
        if: env.HAS_CLOUDFLARE_SECRETS == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
